[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
    "E402",  # main.py loads .env before app imports by design
]

[tool.ruff.lint.per-file-ignores]
"app/prompts.py" = ["E501"]  # prompt text must stay verbatim

[tool.pytest.ini_options]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
