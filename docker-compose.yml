services:
  feedback-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false # starts in keyless demo mode without one
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
